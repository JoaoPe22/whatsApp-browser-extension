<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Helper</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>WhatsApp Helper</h1>
      <p id="status">Ready.</p>
      <label class="field">
        <span>Your name</span>
        <input id="display-name" type="text" placeholder="Ex: Maria" />
      </label>
      <label class="toggle">
        <input id="enabled-toggle" type="checkbox" />
        <span>Enable prefix</span>
      </label>
      <button id="save-button" type="button">Save name</button>
      <pre id="output">No data yet.</pre>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
